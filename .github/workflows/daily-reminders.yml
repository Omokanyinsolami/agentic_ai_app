name: Daily Reminder Emails

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r Backend/requirements.txt

      - name: Run 5-day reminder job
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_CONNECT_TIMEOUT: ${{ secrets.DB_CONNECT_TIMEOUT }}
          DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_FROM_EMAIL: ${{ secrets.BREVO_FROM_EMAIL }}
          BREVO_FROM_NAME: ${{ secrets.BREVO_FROM_NAME }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          REMINDER_LOOKAHEAD_DAYS: ${{ secrets.REMINDER_LOOKAHEAD_DAYS }}
        run: python Backend/daily_reminder.py --days "${REMINDER_LOOKAHEAD_DAYS:-5}"
